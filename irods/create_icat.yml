---
- name: Create ICAT DB
  hosts: irods_catalog
  run_once: true
  gather_facts: false
  tasks:
    - name: Create DB on primary DBMS
      ansible.builtin.import_role:
        name: postgresql_db
      vars:
        postgresql_db_dbms_port: "{{ _irods_dbms_port }}"
        postgresql_db_name: ICAT
        postgresql_db_admin_user: "{{ _irods_db_user }}"
        postgresql_db_admin_password: "{{ _irods_db_password }}"
      delegate_to: "{{ _irods_dbms_host }}"
      delegate_facts: true
      become: true
      become_user: postgres

    - name: Create transfer totals table
      community.postgresql.postgresql_table:
        login_db: ICAT
        owner: "{{ _irods_db_user }}"
        name: r_transfer_totals
        columns:
          - user_id BIGINT NOT NULL
          - action VARCHAR(250) NOT NULL
          - exbibytes BIGINT NOT NULL
          - bytes BIGINT NOT NULL
      delegate_to: "{{ _irods_dbms_host }}"
      delegate_facts: true
      become: true
      become_user: postgres

    - name: Create index for transfer totals table
      community.postgresql.postgresql_idx:
        login_db: ICAT
        name: unique_user_action
        table: r_transfer_totals
        columns: user_id, action
        unique: true
      delegate_to: "{{ _irods_dbms_host }}"
      delegate_facts: true
      become: true
      become_user: postgres